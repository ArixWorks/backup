services:
  postgres:
    image: postgres:16-alpine
    container_name: botsubio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botsubio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botsubio}
      POSTGRES_DB: ${POSTGRES_DB:-botsubio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botsubio} -d ${POSTGRES_DB:-botsubio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: botsubio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botsubio-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Same Postgres instance powers both the pooled and direct URLs when self-hosting.
      POSTGRES_PRISMA_URL: postgresql://${POSTGRES_USER:-botsubio}:${POSTGRES_PASSWORD:-botsubio}@postgres:5432/${POSTGRES_DB:-botsubio}?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://${POSTGRES_USER:-botsubio}:${POSTGRES_PASSWORD:-botsubio}@postgres:5432/${POSTGRES_DB:-botsubio}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - "${APP_PORT:-3000}:3000"
    # Apply schema + seed on first boot, then start the server.
    command: sh -c "pnpm exec prisma migrate deploy || pnpm exec prisma db push --skip-generate; node server.js"

volumes:
  postgres_data:
  redis_data:
